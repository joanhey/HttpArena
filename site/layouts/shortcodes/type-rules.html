<style>
.type-rules { margin-top: 1rem; margin-bottom: 1.5rem; border: 1px solid rgba(59,130,246,0.15); border-radius: 0.5rem; overflow: hidden; }
.type-rules-tabs { display: flex; background: rgba(0,0,0,0.03); border-bottom: 1px solid rgba(59,130,246,0.1); }
.type-rules-tab { flex: 1; padding: 0.6rem 1rem; font-size: 0.85rem; font-weight: 600; text-align: center; cursor: pointer; border: none; background: transparent; color: #64748b; transition: all 0.15s; user-select: none; }
.type-rules-tab:hover { color: #1e293b; background: rgba(0,0,0,0.02); }
.type-rules-tab.active[data-tab="production"] { color: #15803d; background: rgba(34,197,94,0.08); border-bottom: 2px solid #22c55e; }
.type-rules-tab.active[data-tab="tuned"] { color: #92400e; background: rgba(234,179,8,0.06); border-bottom: 2px solid #eab308; }
.type-rules-tab.active[data-tab="engine"] { color: #991b1b; background: rgba(220,38,38,0.06); border-bottom: 2px solid #dc2626; }
.type-rules-panel { display: none; padding: 1rem 1.25rem; font-size: 0.9rem; line-height: 1.7; color: #334155; }
.type-rules-panel.active { display: block; }
.type-rules-panel ul { margin: 0.5rem 0; padding-left: 1.5rem; }
.type-rules-panel li { margin-bottom: 0.3rem; }
html.dark .type-rules { border-color: rgba(59,130,246,0.25); }
html.dark .type-rules-tabs { background: rgba(255,255,255,0.03); border-color: rgba(59,130,246,0.15); }
html.dark .type-rules-tab { color: #64748b; }
html.dark .type-rules-tab:hover { color: #cbd5e1; }
html.dark .type-rules-tab.active[data-tab="production"] { color: #4ade80; background: rgba(34,197,94,0.1); }
html.dark .type-rules-tab.active[data-tab="tuned"] { color: #fbbf24; background: rgba(234,179,8,0.08); }
html.dark .type-rules-tab.active[data-tab="engine"] { color: #f87171; background: rgba(220,38,38,0.08); }
html.dark .type-rules-panel { color: #cbd5e1; }
</style>

{{ $production := .Get "production" }}
{{ $tuned := .Get "tuned" }}
{{ $engine := .Get "engine" }}

<div class="type-rules">
  <div class="type-rules-tabs">
    <div class="type-rules-tab active" data-tab="production" onclick="var r=this.closest('.type-rules');r.querySelectorAll('.type-rules-tab').forEach(function(t){t.classList.remove('active')});this.classList.add('active');r.querySelectorAll('.type-rules-panel').forEach(function(p){p.classList.remove('active')});r.querySelector('[data-panel=production]').classList.add('active')"><span class="lb-type-square" style="background:#22c55e;"></span> Production</div>
    <div class="type-rules-tab" data-tab="tuned" onclick="var r=this.closest('.type-rules');r.querySelectorAll('.type-rules-tab').forEach(function(t){t.classList.remove('active')});this.classList.add('active');r.querySelectorAll('.type-rules-panel').forEach(function(p){p.classList.remove('active')});r.querySelector('[data-panel=tuned]').classList.add('active')"><span class="lb-type-square" style="background:#eab308;"></span> Tuned</div>
    <div class="type-rules-tab" data-tab="engine" onclick="var r=this.closest('.type-rules');r.querySelectorAll('.type-rules-tab').forEach(function(t){t.classList.remove('active')});this.classList.add('active');r.querySelectorAll('.type-rules-panel').forEach(function(p){p.classList.remove('active')});r.querySelector('[data-panel=engine]').classList.add('active')"><span class="lb-type-square" style="background:#dc2626;"></span> Engine</div>
  </div>
  <div class="type-rules-panel active" data-panel="production">{{ $production }}</div>
  <div class="type-rules-panel" data-panel="tuned">{{ $tuned }}</div>
  <div class="type-rules-panel" data-panel="engine">{{ $engine }}</div>
</div>
